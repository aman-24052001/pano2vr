<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>pano2vr viewer</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    #info {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: #ccc; font: 13px system-ui, sans-serif; opacity: 0.8; text-align: center;
      max-width: 90vw;
    }
    #error {
      position: fixed; top: 56px; left: 12px; right: 12px; z-index: 3;
      color: #ff6b6b; background: rgba(0,0,0,0.7); border: 1px solid #ff6b6b;
      font: 12px/1.4 ui-monospace, monospace; padding: 8px; white-space: pre-wrap;
      display: none; max-height: 40vh; overflow: auto;
    }
    #fileInput {
      position: fixed; top: 12px; left: 12px; z-index: 2;
      font: 13px system-ui, sans-serif;
    }
  </style>
  <!--
    Import map: three.js's own example addons (GLTFLoader, VRButton, ...)
    use bare specifiers internally — `import * as THREE from "three"` —
    which only resolves in a browser if "three" is mapped here. Without
    this, loading those addon files from a CDN throws
    "Failed to resolve module specifier 'three'" even though the addon
    file itself loaded fine.
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <input id="fileInput" type="file" accept=".glb" />
  <div id="error"></div>
  <div id="info">Demo mesh loads automatically. Tap "Enter VR" to view in stereo, or pick a different .glb above.</div>

  <script type="module">
    // On-screen error surface — this page mostly gets debugged from a phone
    // with no devtools attached, so failures need to be visible in-page.
    const errorBox = document.getElementById("error");
    function showError(label, err) {
      console.error(label, err);
      errorBox.style.display = "block";
      errorBox.textContent += `[${label}] ${err?.message || err}\n`;
    }
    window.addEventListener("error", (e) => showError("script", e.error || e.message));
    window.addEventListener("unhandledrejection", (e) => showError("promise", e.reason));

    try {
      const THREE = await import("three");
      const { GLTFLoader } = await import("three/examples/jsm/loaders/GLTFLoader.js");
      const { VRButton } = await import("three/examples/jsm/webxr/VRButton.js");

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
      // Start at the capture origin — this is the point the mesh was displaced
      // around, so head movement away from (0,0,0) is what produces parallax.
      camera.position.set(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      if (navigator.xr) {
        document.body.appendChild(VRButton.createButton(renderer));
      } else {
        showError("webxr", "navigator.xr is unavailable in this browser (try Chrome on Android; Safari/iOS has no WebXR).");
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const loader = new GLTFLoader();
      let currentMesh = null;

      function loadGLB(url) {
        if (currentMesh) scene.remove(currentMesh);
        loader.load(
          url,
          (gltf) => {
            currentMesh = gltf.scene;
            scene.add(currentMesh);
          },
          undefined,
          (err) => showError("glb-load:" + url, err)
        );
      }

      document.getElementById("fileInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) loadGLB(URL.createObjectURL(file));
      });

      // Convenience: ?glb=path/to/file.glb to load directly (e.g. from the CLI output).
      // Falls back to the bundled demo.glb so the page is useful with no query string.
      const params = new URLSearchParams(window.location.search);
      loadGLB(params.get("glb") || "demo.glb");

      renderer.setAnimationLoop(() => renderer.render(scene, camera));
    } catch (err) {
      showError("init", err);
    }
  </script>
</body>
</html>
