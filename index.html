<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>pano2vr viewer</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    #info {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: #ccc; font: 13px system-ui, sans-serif; opacity: 0.8;
    }
    #loadBtn {
      position: fixed; top: 12px; left: 12px; z-index: 2;
      font: 13px system-ui, sans-serif; padding: 6px 10px;
    }
  </style>
</head>
<body>
  <input id="fileInput" type="file" accept=".glb" style="position:fixed;top:12px;left:12px;z-index:2;" />
  <div id="info">Demo mesh loads automatically. Tap "Enter VR" to view in stereo, or pick a different .glb above.</div>

  <script type="module">
    import * as THREE from "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js";
    import { GLTFLoader } from "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/examples/jsm/loaders/GLTFLoader.min.js";
    import { VRButton } from "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/examples/jsm/webxr/VRButton.min.js";

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
    // Start at the capture origin — this is the point the mesh was displaced
    // around, so head movement away from (0,0,0) is what produces parallax.
    camera.position.set(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const loader = new GLTFLoader();
    let currentMesh = null;

    function loadGLB(url) {
      if (currentMesh) scene.remove(currentMesh);
      loader.load(url, (gltf) => {
        currentMesh = gltf.scene;
        scene.add(currentMesh);
      });
    }

    document.getElementById("fileInput").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) loadGLB(URL.createObjectURL(file));
    });

    // Convenience: ?glb=path/to/file.glb to load directly (e.g. from the CLI output).
    // Falls back to the bundled demo.glb so the page is useful with no query string.
    const params = new URLSearchParams(window.location.search);
    loadGLB(params.get("glb") || "demo.glb");

    renderer.setAnimationLoop(() => renderer.render(scene, camera));
  </script>
</body>
</html>
